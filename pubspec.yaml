name: ymsoftapp
description: YM Soft Approval Mobile App
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.18.1
  flutter_secure_storage: ^9.0.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.0
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  
  # Local Notifications
  flutter_local_notifications: ^17.0.0
  
  # Animation
  lottie: ^2.7.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # File Picker
  file_picker: ^8.0.0+1

  # Signature
  signature: ^5.4.0
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # File Opener
  open_filex: ^4.3.2
  
  # PDF Viewer
  pdfx: ^2.9.2
  
  # Video Player
  video_player: ^2.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo-icon.png"

